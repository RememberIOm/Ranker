{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-6">
    <span class="text-6xl" aria-hidden="true">{{ icon }}</span>
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">{{ title }}</h2>
    <p class="text-gray-500 dark:text-gray-400 max-w-md">{{ description }}</p>
    <a href="{{ link_url }}"
       class="px-8 py-3 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-bold shadow-lg shadow-brand-500/30 transition">
        {{ link_text }}
    </a>
</div>
{% endblock %}
