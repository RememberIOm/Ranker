services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app          # 소스코드 마운트 (hot reload)
      - /app/.venv      # venv는 컨테이너 내부 것 사용
      - ranker_data:/data  # 세션 데이터 영속
    environment:
      - SESSION_DIR=/data/sessions

  tailwind:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app                          # 소스코드 공유 (output.css를 호스트에 직접 기록)
      - tailwind_modules:/app/node_modules  # node_modules는 Docker 볼륨으로 격리 (호스트 미노출)
    command: >
      sh -c "npm install tailwindcss @tailwindcss/cli &&
             mkdir -p static &&
             ./node_modules/.bin/tailwindcss -i input.css -o static/output.css --watch=always"

volumes:
  ranker_data:
  tailwind_modules:
