# fly.toml — 세션 기반 멀티유저 Ranker
app = 'battle-ranker'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# 세션 JSON 파일 저장 볼륨 (/data/sessions/)
[mounts]
  source = "ranker_data"
  destination = "/data"

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
