# fly.toml — 세션 기반 멀티유저 Ranker
app = 'battle-ranker'
primary_region = 'nrt'

[build]

[env]
  COOKIE_SECURE = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "get"
    path = "/"
    timeout = "5s"

# 세션 JSON 파일 저장 볼륨 (/data/sessions/)
[mounts]
  source = "ranker_data"
  destination = "/data"

[[vm]]
  # 현재 저장소 계층은 단일 프로세스 전제를 둡니다.
  memory = '512mb'
  cpus = 1
  memory_mb = 512
